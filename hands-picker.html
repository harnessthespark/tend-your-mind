<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>your hands — skin tone</title>
<style>
  :root{ --paper:#f5efe2; --card:#fbf7ee; --ink:#3b4136; --ink-soft:#6c715f; --line:#dacfb6;
         --font:"Atkinson Hyperlegible",system-ui,sans-serif; --display:"Caveat",cursive; }
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font);
    text-align:center;padding:24px 16px 60px}
  h1{font-family:var(--display);font-size:2.1rem;margin:.1em 0}
  .lede{color:var(--ink-soft);max-width:40ch;margin:0 auto 10px}

  /* the hands sit on a soft garden patch so they read in context */
  .stage{max-width:460px;margin:8px auto 0;aspect-ratio:3/2;border-radius:18px;
    background:linear-gradient(#bfe0f0 0%,#9fd07a 60%,#7fb85f 100%);
    display:flex;align-items:flex-end;justify-content:center;overflow:hidden}
  .hands{width:74%;height:auto;margin-bottom:-2%;
    /* the skin tone — a CSS filter shifts the whole shaded image together */
    filter:var(--skin-filter,none);transition:filter .35s ease}

  .pickwrap{margin:16px auto 0;max-width:420px}
  .q{font-weight:800;margin:0 0 8px}
  .picker{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .swatch{width:40px;height:40px;border-radius:50%;border:2px solid #fff;cursor:pointer;
    box-shadow:0 0 0 1.5px var(--line);transition:transform .12s, box-shadow .15s}
  .swatch:hover{transform:translateY(-2px)}
  .swatch[aria-pressed="true"]{box-shadow:0 0 0 3px var(--ink);transform:translateY(-2px)}
  .hint{color:var(--ink-soft);font-size:.9rem;margin-top:12px}
</style>
</head>
<body>
  <h1>make these yours</h1>
  <p class="lede">The gardener out in the garden is anyone. These hands — the ones doing the work — are <em>yours</em>.</p>

  <div class="stage">
    <img class="hands" id="hands" src="assets/hands-web.png" alt="A pair of hands, reaching">
  </div>

  <div class="pickwrap">
    <p class="q">your skin tone</p>
    <div class="picker" id="picker"></div>
    <p class="hint">tap a tone — the hands shift to match. it's remembered.</p>
  </div>

<script>
(function(){
  // each tone: the swatch colour you see + the filter that shifts the hands to it.
  // (filters preserve the illustration's shading — it just goes lighter/deeper.)
  var TONES = [
    {name:'light',    swatch:'#f0d6bd', filter:'brightness(1.34) saturate(.72) hue-rotate(-4deg)'},
    {name:'fair',     swatch:'#e6bd94', filter:'brightness(1.16) saturate(.88)'},
    {name:'medium',   swatch:'#cd9a6c', filter:'none'},               /* the hands as drawn */
    {name:'tan',      swatch:'#a9744a', filter:'brightness(.84) saturate(1.08) hue-rotate(2deg)'},
    {name:'deep',     swatch:'#79502e', filter:'brightness(.62) saturate(1.14) hue-rotate(3deg)'},
    {name:'deepest',  swatch:'#523620', filter:'brightness(.46) saturate(1.12) hue-rotate(4deg)'}
  ];
  var picker=document.getElementById('picker'), hands=document.getElementById('hands');

  function apply(t){
    document.documentElement.style.setProperty('--skin-filter', t.filter);
    try{ localStorage.setItem('garden.skin', t.name); }catch(e){}
    Array.prototype.forEach.call(picker.children,function(b){
      b.setAttribute('aria-pressed', b.dataset.name===t.name); });
  }
  TONES.forEach(function(t){
    var b=document.createElement('button');
    b.className='swatch'; b.type='button'; b.dataset.name=t.name;
    b.style.background=t.swatch; b.setAttribute('aria-label','skin tone: '+t.name);
    b.setAttribute('aria-pressed','false');
    b.addEventListener('click',function(){ apply(t); });
    picker.appendChild(b);
  });
  // restore saved choice, else default to the hands as drawn (medium)
  var saved; try{ saved=localStorage.getItem('garden.skin'); }catch(e){}
  apply(TONES.filter(function(t){return t.name===saved;})[0] || TONES[2]);
})();
</script>
</body>
</html>
