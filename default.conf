server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    # garden.html is the app entry; index.html is the older prototype
    index garden.html index.html;
    location / { try_files $uri $uri/ =404; }
    location ~* \.(png|svg|jpg|jpeg|webp|gif|woff2?)$ {
        expires 7d; add_header Cache-Control "public";
    }
}
