<!DOCTYPE html>
<!--
  EXPLORATION SKETCH — "weather over the garden" = Window of Tolerance, themed.
  Question this is testing: does FROST read as stillness, STORM as too-much,
  GROWING as gentle? Smallest scene that answers it (sky + tree + grass).
  NOT the real build — no bucket / taps / Maslow / persistence yet.

  Rules honoured:
   - Frost (hypoarousal) = LITERAL zero motion. Snow sits, fog doesn't drift,
     plants don't sway. (Lisa's hypoarousal-is-stillness principle.)
   - Storm (hyperarousal) carries the motion; but has a reduced-motion reading
     (dark sky + static slanted rain + bent plants) so "too much" survives
     without movement.
   - Nothing dies — frost = dormant, waiting for warmth.
-->
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>weather over the garden — exploration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#33414c; --ink-soft:#5d6b74; --paper:#f4eee2; --line:#cfc6b5;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:"Atkinson Hyperlegible",system-ui,sans-serif; color:var(--ink);
    background:var(--paper); line-height:1.6; padding:28px clamp(16px,5vw,48px) 60px;
    -webkit-font-smoothing:antialiased;
  }
  .head{max-width:760px; margin:0 auto 22px}
  h1{font-family:"Caveat",cursive; font-weight:700; font-size:clamp(2.2rem,6vw,3.2rem); margin:0 0 4px}
  .head p{margin:0; color:var(--ink-soft); max-width:60ch}
  .backstage{font-size:.85rem; color:#a59a86; font-style:italic; margin-top:6px}

  .stage{max-width:760px; margin:0 auto}

  /* ---------- the scene ---------- */
  .scene{
    position:relative; width:100%; aspect-ratio:16/10; border-radius:24px; overflow:hidden;
    box-shadow:0 24px 50px -22px rgba(60,50,40,.4); background:#bfe0ec;
    transition:background 1s var(--ease);
  }
  .layer{position:absolute; inset:0; pointer-events:none}

  /* sky gradient via overlay so we can crossfade */
  .sky{transition:opacity 1s var(--ease), background 1s var(--ease)}
  .scene[data-state="growing"] .sky{background:linear-gradient(#a9d8e8 0%,#cdeade 45%,#f5e9cf 100%)}
  .scene[data-state="storm"]   .sky{background:linear-gradient(#3f4750 0%,#586069 60%,#6c7079 100%)}
  .scene[data-state="frost"]   .sky{background:linear-gradient(#d4dde4 0%,#e4ebee 55%,#eef2f3 100%)}

  /* sun (growing only) */
  .sun{top:13%; right:15%; width:74px; height:74px; border-radius:50%;
       background:radial-gradient(circle at 40% 40%,#ffe7a6,#f4c64d);
       box-shadow:0 0 50px 16px rgba(244,198,77,.45);
       opacity:0; transform:scale(.7); transition:opacity 1s var(--ease), transform 1s var(--ease)}
  .scene[data-state="growing"] .sun{opacity:1; transform:scale(1)}
  .sun-wrap{position:absolute; inset:0}

  /* clouds */
  .cloud{position:absolute; border-radius:50%; opacity:0; transition:opacity 1s var(--ease), background 1s var(--ease)}
  .scene[data-state="storm"] .cloud{opacity:.95; background:#363c44}
  .scene[data-state="frost"] .cloud{opacity:.5; background:#cdd6da}
  .c1{top:9%; left:12%; width:150px; height:60px}
  .c2{top:5%; left:34%; width:200px; height:74px}
  .c3{top:14%; right:10%; width:140px; height:54px}

  /* rain — static slanted streaks; motion only animates position */
  .rain{
    opacity:0; transition:opacity .8s var(--ease);
    background-image:repeating-linear-gradient(100deg,
      transparent 0 9px, rgba(214,224,232,.55) 9px 10px);
    background-size:auto 24px;
  }
  .scene[data-state="storm"] .rain{opacity:.85; animation:rainfall .55s linear infinite}
  @keyframes rainfall{from{background-position:0 0} to{background-position:-6px 24px}}

  /* fog — frost only, STATIC */
  .fog{
    opacity:0; transition:opacity 1.1s var(--ease);
    background:
      radial-gradient(120% 60% at 50% 92%, rgba(245,249,250,.92), transparent 70%),
      linear-gradient(transparent 40%, rgba(238,243,245,.72) 100%);
  }
  .scene[data-state="frost"] .fog{opacity:1}

  /* ground */
  .ground{top:auto; height:30%; bottom:0; transition:background 1s var(--ease)}
  .scene[data-state="growing"] .ground{background:linear-gradient(#8fbd6f,#6f9e53)}
  .scene[data-state="storm"]   .ground{background:linear-gradient(#586a4b,#45533a)}
  .scene[data-state="frost"]   .ground{background:linear-gradient(#dfe7e6,#c4cecd)}

  /* snow sitting on the ground — frost only, STATIC */
  .snow{top:auto; bottom:0; height:30%; opacity:0; transition:opacity 1.1s var(--ease)}
  .scene[data-state="frost"] .snow{opacity:1}
  .snow span{position:absolute; background:#f7fbfc; border-radius:50%}

  /* ---------- plants ---------- */
  .plant{position:absolute; bottom:22%; transform-origin:bottom center}
  .tree-wrap{left:24%; width:165px}
  .grass-wrap{left:58%; width:96px; bottom:21%}
  .plant svg{width:100%; height:auto; display:block; overflow:visible}

  .leaf-fill{transition:fill 1s var(--ease), opacity 1s var(--ease)}
  .scene[data-state="growing"] .leaf-fill{fill:#6fa860}
  .scene[data-state="storm"]   .leaf-fill{fill:#4d6a46}
  .scene[data-state="frost"]   .leaf-fill{opacity:0}      /* leaves gone — dormant */
  .trunk{fill:#8a6a47; transition:fill 1s var(--ease)}
  .scene[data-state="frost"] .trunk{fill:#8d8378}
  .branches{stroke:#9aa3a6; stroke-width:2.4; fill:none; stroke-linecap:round; opacity:0; transition:opacity 1s var(--ease)}
  .scene[data-state="frost"] .branches{opacity:1}
  .snowcap{fill:#f4f8fa; opacity:0; transition:opacity 1s var(--ease)}
  .scene[data-state="frost"] .snowcap{opacity:1}

  .blade{transition:fill 1s var(--ease)}
  .scene[data-state="growing"] .blade{fill:#7fae5f}
  .scene[data-state="storm"]   .blade{fill:#566b43}
  .scene[data-state="frost"]   .blade{fill:#bcc6c3}

  /* ---- motion: growing = gentle, storm = bent+fast, frost = NONE ---- */
  .scene[data-state="growing"] .tree-wrap{animation:sway-soft 7s ease-in-out infinite}
  .scene[data-state="growing"] .grass-wrap{animation:sway-soft-g 5s ease-in-out infinite}
  .scene[data-state="storm"] .tree-wrap{animation:sway-wind 0.7s ease-in-out infinite; transform:rotate(-5deg)}
  .scene[data-state="storm"] .grass-wrap{animation:sway-wind-g 0.5s ease-in-out infinite; transform:rotate(9deg)}
  .scene[data-state="frost"] .tree-wrap,
  .scene[data-state="frost"] .grass-wrap{animation:none; transform:rotate(0deg)}

  @keyframes sway-soft{0%,100%{transform:rotate(-1.4deg)}50%{transform:rotate(1.4deg)}}
  @keyframes sway-soft-g{0%,100%{transform:rotate(-2.5deg)}50%{transform:rotate(2.5deg)}}
  @keyframes sway-wind{0%{transform:rotate(-3deg)}100%{transform:rotate(-8deg)}}
  @keyframes sway-wind-g{0%{transform:rotate(6deg)}100%{transform:rotate(13deg)}}

  /* flying leaves (storm, motion only) */
  .flyer{position:absolute; width:13px; height:9px; background:#4d6a46; border-radius:0 60% 0 60%; opacity:0}
  .scene[data-state="storm"] .flyer{opacity:.9; animation:fly 1.1s linear infinite}
  .f1{top:40%; left:30%; animation-delay:0s}
  .f2{top:33%; left:40%; animation-delay:.4s}
  .f3{top:50%; left:36%; animation-delay:.8s}
  @keyframes fly{from{transform:translate(0,0) rotate(0)} to{transform:translate(220px,-60px) rotate(220deg); opacity:0}}

  /* ---------- caption + controls ---------- */
  .caption{
    margin:18px auto 0; max-width:760px; min-height:3.4em;
    border-left:4px solid #6fa860; padding:8px 0 8px 18px; transition:border-color 1s var(--ease);
  }
  .caption .t{font-family:"Caveat",cursive; font-weight:700; font-size:1.7rem; line-height:1.05}
  .caption .d{color:var(--ink-soft); margin-top:2px}
  .scene[data-cap="storm"] ~ .caption,
  body.storm .caption{border-color:#6b727a}
  .controls{display:flex; gap:12px; max-width:760px; margin:22px auto 0; flex-wrap:wrap}
  .ctrl{
    font-family:inherit; font-weight:700; font-size:1rem; cursor:pointer;
    border:1.5px solid var(--line); background:#fbf7ee; color:var(--ink-soft);
    border-radius:999px; padding:11px 22px; transition:all .25s var(--ease);
  }
  .ctrl:hover{border-color:var(--ink-soft); color:var(--ink)}
  .ctrl[aria-pressed="true"]{background:var(--ink); border-color:var(--ink); color:#fff}
  :focus-visible{outline:3px solid #6fa860; outline-offset:3px}

  /* ---- reduced motion: storm must still read as "too much" without movement ---- */
  @media(prefers-reduced-motion:reduce){
    *{animation:none !important}
    .scene[data-state="storm"] .tree-wrap{transform:rotate(-7deg)}
    .scene[data-state="storm"] .grass-wrap{transform:rotate(12deg)}
    .scene[data-state="storm"] .rain{opacity:.9}     /* static slanted streaks remain */
    .scene[data-state="storm"] .flyer{opacity:0}     /* no frozen mid-air leaves */
  }
</style>
</head>
<body>
  <div class="head">
    <h1>Weather over the garden</h1>
    <p>Same garden, three weathers. Does <strong>frost</strong> feel still, <strong>storm</strong> feel like too much, and <strong>growing</strong> feel gentle? Tap through and see.</p>
    <p class="backstage">(Backstage, this is the Window of Tolerance — above your window, inside it, below it — dressed as weather.)</p>
  </div>

  <div class="stage">
    <div class="scene" id="scene" data-state="growing" role="img" aria-label="A small garden under changing weather">
      <div class="layer sky"></div>
      <div class="sun-wrap"><div class="sun" style="position:absolute"></div></div>
      <div class="layer"><div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div></div>
      <div class="layer rain"></div>
      <div class="layer ground"></div>
      <div class="layer snow" id="snow"></div>
      <div class="layer fog"></div>

      <!-- tree -->
      <div class="plant tree-wrap">
        <svg viewBox="0 0 150 175" aria-hidden="true">
          <path class="trunk" d="M68,175 C66,140 64,120 64,104 C64,96 86,96 86,104 C86,122 84,144 82,175 Z"/>
          <!-- bare branches (frost) -->
          <g class="branches">
            <path d="M75,108 L58,80 M58,80 L48,66 M58,80 L66,62"/>
            <path d="M75,108 L92,78 M92,78 L102,64 M92,78 L84,60"/>
            <path d="M75,104 L75,66"/>
          </g>
          <!-- leafy canopy -->
          <path class="leaf-fill" d="M75,18 C44,18 24,40 28,66 C16,78 22,104 46,106 C58,118 92,118 104,106 C128,104 134,78 122,66 C126,40 106,18 75,18 Z"/>
          <!-- snow caps (frost) -->
          <path class="snowcap" d="M50,66 C56,60 68,60 74,65 C80,60 92,61 98,67 C92,70 84,69 80,72 C72,68 60,69 50,66 Z"/>
        </svg>
      </div>

      <!-- grass tuft -->
      <div class="plant grass-wrap">
        <svg viewBox="0 0 96 80" aria-hidden="true">
          <path class="blade" d="M30,80 C22,56 16,40 10,24 C16,40 26,58 34,80 Z"/>
          <path class="blade" d="M44,80 C42,52 42,32 42,12 C46,34 50,56 50,80 Z"/>
          <path class="blade" d="M58,80 C64,56 72,40 82,26 C74,46 66,62 62,80 Z"/>
          <path class="blade" d="M38,80 C30,60 26,46 22,34 C30,52 38,64 42,80 Z"/>
          <path class="blade" d="M52,80 C58,60 64,48 72,38 C64,54 58,66 56,80 Z"/>
        </svg>
      </div>

      <div class="layer"><div class="flyer f1"></div><div class="flyer f2"></div><div class="flyer f3"></div></div>
    </div>

    <div class="caption" id="caption">
      <div class="t" id="capT"></div>
      <div class="d" id="capD"></div>
    </div>

    <div class="controls" role="group" aria-label="Choose the weather">
      <button class="ctrl" data-state="frost">❄ Frost</button>
      <button class="ctrl" data-state="growing" aria-pressed="true">☀ Growing</button>
      <button class="ctrl" data-state="storm">⛈ Storm</button>
    </div>
  </div>

<script>
(function(){
  var scene=document.getElementById('scene'), capT=document.getElementById('capT'), capD=document.getElementById('capD');
  var caps={
    growing:["Growing weather","You're inside your window. Mild and steady — room to think, feel, and grow."],
    storm:["Storm","Too much. The alarm's up, everything's loud and fast — this is the anxious edge."],
    frost:["Frost","Too little. Still, foggy, dormant. Nothing's died — it's waiting for warmth to return."]
  };
  var colors={growing:"#6fa860", storm:"#6b727a", frost:"#9aa9ad"};
  function set(state){
    scene.setAttribute('data-state',state);
    capT.textContent=caps[state][0]; capD.textContent=caps[state][1];
    document.getElementById('caption').style.borderColor=colors[state];
    document.querySelectorAll('.ctrl').forEach(function(b){
      b.setAttribute('aria-pressed', b.getAttribute('data-state')===state ? 'true':'false');
    });
  }
  document.querySelectorAll('.ctrl').forEach(function(b){
    b.addEventListener('click',function(){ set(b.getAttribute('data-state')); });
  });
  // scatter static snow on the ground
  var snow=document.getElementById('snow'); var html='';
  for(var i=0;i<40;i++){
    var s=2+Math.random()*4, x=Math.random()*100, y=Math.random()*70;
    html+='<span style="left:'+x.toFixed(1)+'%; top:'+y.toFixed(1)+'%; width:'+s.toFixed(1)+'px; height:'+s.toFixed(1)+'px"></span>';
  }
  snow.innerHTML=html;
  set('growing');
})();
</script>
</body>
</html>
