<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>weather intensity — demo</title>
<style>
  /* Demo: how a feeling's mild→intense gradient displays as weather over the
     garden. Intensity scales OPACITY + DENSITY only — slow, soft, no flashing
     (AuDHD-calm). Drag the slider; the same weather thickens. */
  :root{ --paper:#f5efe2; --card:#fbf7ee; --ink:#3b4136; --ink-soft:#6c715f;
         --line:#dacfb6; --font:"Atkinson Hyperlegible",system-ui,sans-serif;
         --display:"Caveat",ui-rounded,cursive; --i:0.5; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font);
    line-height:1.5;padding:22px 16px 60px}
  .wrap{max-width:560px;margin:0 auto;text-align:center}
  h1{font-family:var(--display);font-size:2.1rem;margin:.1em 0}
  .lede{color:var(--ink-soft);margin:0 auto 16px;max-width:42ch}

  /* the garden behind the weather */
  .stage{position:relative;width:100%;aspect-ratio:16/10;border-radius:18px;overflow:hidden;
    box-shadow:0 10px 30px rgba(80,70,50,.15);background:linear-gradient(#8fc0e6 0%,#bfe0f0 55%,#9fd07a 55%,#7fb85f 100%)}
  .garden-sun{position:absolute;top:12%;right:14%;width:64px;height:64px;border-radius:50%;
    background:#ffd766;box-shadow:0 0 40px #ffd76688}
  .tree{position:absolute;bottom:30%;left:14%;width:90px;height:120px}
  .tree .trunk{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:14px;height:46px;background:#8a6f51;border-radius:4px}
  .tree .crown{position:absolute;top:0;left:50%;transform:translateX(-50%);width:90px;height:84px;border-radius:50%;background:#5f8f4e}
  .shed{position:absolute;bottom:30%;right:12%;width:96px;height:74px}
  .shed .body{position:absolute;bottom:0;width:96px;height:54px;background:#b07d4e;border-radius:4px}
  .shed .roof{position:absolute;top:0;left:-6px;width:108px;height:30px;background:#8a5d36;clip-path:polygon(8% 100%,50% 0,92% 100%)}

  /* ---- weather layers (all present, only the active one shows) ---- */
  .w{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .4s ease}
  .stage[data-w="fog"]   .fog,
  .stage[data-w="rain"]  .rain,
  .stage[data-w="storm"] .storm,
  .stage[data-w="sun"]   .sunw,
  .stage[data-w="haze"]  .haze{opacity:1}

  /* FEAR — fog: density = opacity. worry (mist) → panic (can't see) */
  .fog .layer{position:absolute;inset:-10%;background:#d7dad7;
    opacity:calc(.08 + var(--i) * .82);filter:blur(2px);animation:drift 9s ease-in-out infinite}
  /* SADNESS — rain: more, darker drops + greyer sky as it builds */
  .rain .sky{position:absolute;inset:0;background:#5b6675;opacity:calc(var(--i)*.45)}
  .rain i{position:absolute;top:-12%;width:2px;height:16px;background:#cdd8e6;
    opacity:calc(.25 + var(--i)*.6);animation:fall 1.4s linear infinite}
  /* ANGER — storm: darkening swell + a slow (non-strobe) lightning glow at the top end */
  .storm .dark{position:absolute;inset:0;background:#2c2f3a;opacity:calc(var(--i)*.55)}
  .storm .bolt{position:absolute;inset:0;background:radial-gradient(60% 40% at 50% 20%,#fff6c8,transparent);
    opacity:0;animation:flash 6s ease-in-out infinite}
  .stage[data-w="storm"] .storm .bolt{opacity:calc(var(--i)*var(--i))}
  /* ENJOYMENT — sun: warm glow grows; a rainbow arcs in at the top end */
  .sunw .glow{position:absolute;inset:0;background:radial-gradient(50% 50% at 78% 22%,#fff2b0,transparent);
    opacity:calc(.2 + var(--i)*.8)}
  .sunw .rainbow{position:absolute;left:50%;bottom:18%;width:70%;aspect-ratio:2/1;transform:translateX(-50%);
    border-radius:1000px 1000px 0 0;border:9px solid;border-bottom:none;
    border-image:linear-gradient(90deg,#e26d5a,#e6b34a,#e7d24a,#5fa85f,#5aa0c8,#7d6bb0) 1;
    opacity:calc(max(0, (var(--i) - .6)) * 2.5)}
  /* DISGUST — haze: thick, yellow, humid. opacity = thickness */
  .haze .layer{position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 40%,#d9d36a,#b9a83f);
    opacity:calc(.08 + var(--i)*.72);mix-blend-mode:multiply;animation:drift 11s ease-in-out infinite}

  @keyframes drift{0%,100%{transform:translateX(-4%)}50%{transform:translateX(4%)}}
  @keyframes fall{to{transform:translateY(640px)}}
  @keyframes flash{0%,86%,100%{opacity:0}90%{opacity:.5}94%{opacity:.15}}
  @media(prefers-reduced-motion:reduce){ .fog .layer,.haze .layer,.rain i,.storm .bolt{animation:none} }

  /* ---- controls ---- */
  .pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0 6px}
  .pill{font-family:inherit;font-weight:700;font-size:.92rem;cursor:pointer;background:var(--card);
    border:1.5px solid var(--line);border-radius:999px;padding:7px 13px;color:var(--ink)}
  .pill[aria-pressed="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .slider{margin:14px auto 4px;max-width:420px}
  .slider input{width:100%}
  .ends{display:flex;justify-content:space-between;font-weight:700;color:var(--ink-soft);font-size:.95rem}
  .ends .mild{color:#6f8f5e}.ends .intense{color:#cf7a52}
  .caption{font-family:var(--display);font-size:1.5rem;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <h1>weather, mild → intense</h1>
  <p class="lede">Pick a feeling, then drag. Intensity = how <i>much</i> of the weather is there — density and opacity, never flashing.</p>

  <div class="stage" id="stage" data-w="fog" style="--i:.5">
    <div class="garden-sun"></div>
    <div class="tree"><div class="crown"></div><div class="trunk"></div></div>
    <div class="shed"><div class="roof"></div><div class="body"></div></div>
    <div class="w fog"><div class="layer"></div></div>
    <div class="w rain"><div class="sky"></div></div>
    <div class="w storm"><div class="dark"></div><div class="bolt"></div></div>
    <div class="w sunw"><div class="glow"></div><div class="rainbow"></div></div>
    <div class="w haze"><div class="layer"></div></div>
  </div>

  <div class="pills" id="pills"></div>
  <div class="slider">
    <input type="range" id="intensity" min="0" max="100" value="50" aria-label="intensity">
    <div class="ends"><span class="mild" id="mild">mild</span><span class="intense" id="intense">intense</span></div>
  </div>
  <div class="caption" id="caption"></div>
</div>

<script>
(function(){
  var WEATHERS = [
    {k:'fog',  label:'fear · fog',        mild:'worry (thin mist)',    intense:'panic (heavy fog)',  n:0},
    {k:'rain', label:'sadness · rain',    mild:'drizzle',              intense:'downpour',           n:60},
    {k:'storm',label:'anger · storm',     mild:'a simmer',             intense:'thunder & lightning',n:0},
    {k:'sun',  label:'enjoyment · sun',   mild:'sunny intervals',      intense:'blazing + rainbow',  n:0},
    {k:'haze', label:'disgust · haze',    mild:'an off-smell',         intense:'choking yellow smog',n:0}
  ];
  var stage=document.getElementById('stage'), pills=document.getElementById('pills'),
      slider=document.getElementById('intensity'), mild=document.getElementById('mild'),
      intense=document.getElementById('intense'), cap=document.getElementById('caption');
  var cur=WEATHERS[0];

  // rain drops (density also nudged by intensity via opacity in CSS)
  var rainEl=stage.querySelector('.rain');
  for(var i=0;i<60;i++){ var d=document.createElement('i');
    d.style.left=(2+i*1.6)+'%'; d.style.animationDelay=(i%10*0.13)+'s'; rainEl.appendChild(d); }

  function setW(w){
    cur=w; stage.setAttribute('data-w', w.k);
    mild.textContent=w.mild; intense.textContent=w.intense;
    Array.prototype.forEach.call(pills.children,function(b){ b.setAttribute('aria-pressed', b.dataset.k===w.k); });
    update();
  }
  function update(){
    var v=slider.value/100; stage.style.setProperty('--i', v);
    var word = v<.33 ? cur.mild : v>.66 ? cur.intense : 'building…';
    cap.textContent = word;
  }
  WEATHERS.forEach(function(w){
    var b=document.createElement('button'); b.className='pill'; b.type='button'; b.dataset.k=w.k;
    b.textContent=w.label; b.setAttribute('aria-pressed', w.k===cur.k);
    b.addEventListener('click',function(){ setW(w); }); pills.appendChild(b);
  });
  slider.addEventListener('input', update);
  setW(cur);
})();
</script>
</body>
</html>
