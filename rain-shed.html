<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rain on the shed window</title>
<style>
  body{margin:0;background:#2a2620;display:flex;align-items:center;justify-content:center;
    min-height:100vh;font-family:system-ui,sans-serif}
  .scene{position:relative;width:min(96vw,1100px);aspect-ratio:1400/787;
    background:url('assets/inside-shed-web.png') center/cover;border-radius:14px;overflow:hidden;
    box-shadow:0 18px 50px rgba(0,0,0,.4)}

  /* each window pane: the garden behind goes cool + blurred (wet glass), then
     a canvas draws drifting clouds (back) + condensation + running drops (front) */
  .pane{position:absolute;overflow:hidden;
    backdrop-filter:blur(2.4px) saturate(.7) brightness(.84);
    -webkit-backdrop-filter:blur(2.4px) saturate(.7) brightness(.84);
    background:linear-gradient(rgba(86,100,116,.30),rgba(64,78,94,.36))}
  .pane canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  /* window glass positions, % of the scene */
  .left {left:13.8%; top:6.6%; width:27.3%; height:39.6%}
  .right{left:52.6%; top:6.6%; width:24.6%; height:39.6%}

  .cap{position:absolute;left:50%;bottom:5%;transform:translateX(-50%);
    background:rgba(20,24,20,.55);color:#f3efe6;font-family:"Caveat",cursive;font-size:1.5rem;
    padding:6px 18px;border-radius:999px;backdrop-filter:blur(3px)}
</style>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="scene">
    <div class="pane left"><canvas></canvas></div>
    <div class="pane right"><canvas></canvas></div>
    <span class="cap">watching the rain pass</span>
  </div>

<script>
(function(){
  var dpr=Math.min(2, window.devicePixelRatio||1);
  function R(a,b){ return a+Math.random()*(b-a); }

  function glass(canvas){
    var ctx=canvas.getContext('2d'), W,H, drops, runners, clouds, raf;
    function size(){
      W=canvas.width=Math.max(2,canvas.clientWidth*dpr);
      H=canvas.height=Math.max(2,canvas.clientHeight*dpr); seed();
    }
    function seed(){
      drops=[]; var n=Math.min(260, W*H/(6500));
      for(var i=0;i<n;i++) drops.push({x:R(0,W),y:R(0,H),r:R(1,3)*dpr});
      runners=[];
      clouds=[]; for(var c=0;c<3;c++) clouds.push({x:R(0,W),y:R(0,H*0.45),r:R(W*0.28,W*0.55),sp:R(.04,.13)*dpr});
    }
    function cloud(c){
      var g=ctx.createRadialGradient(c.x,c.y,c.r*0.1,c.x,c.y,c.r);
      g.addColorStop(0,'rgba(222,228,236,0.32)'); g.addColorStop(1,'rgba(222,228,236,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,6.283); ctx.fill();
    }
    function drop(d){
      var g=ctx.createRadialGradient(d.x-d.r*0.35,d.y-d.r*0.45,d.r*0.1,d.x,d.y,d.r);
      g.addColorStop(0,'rgba(255,255,255,0.55)');
      g.addColorStop(0.5,'rgba(210,230,242,0.12)');
      g.addColorStop(1,'rgba(150,175,195,0.02)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,6.283); ctx.fill();
    }
    function frame(){
      ctx.clearRect(0,0,W,H);
      for(var i=0;i<clouds.length;i++){ var c=clouds[i]; cloud(c); c.x+=c.sp; if(c.x-c.r>W) c.x=-c.r; }
      for(var k=0;k<drops.length;k++) drop(drops[k]);
      if(runners.length<7 && Math.random()<0.04) runners.push({x:R(0,W),y:R(-12,H*0.22),r:R(3,7)*dpr,v:R(.3,1.0)*dpr});
      for(var j=runners.length-1;j>=0;j--){ var r=runners[j];
        var tg=ctx.createLinearGradient(r.x,r.y-36*dpr,r.x,r.y);
        tg.addColorStop(0,'rgba(235,245,250,0)'); tg.addColorStop(1,'rgba(235,245,250,0.22)');
        ctx.fillStyle=tg; ctx.fillRect(r.x-r.r*0.45,r.y-36*dpr,r.r*0.9,36*dpr);
        drop(r); r.y+=r.v; r.v*=1.008; if(r.y>H+20) runners.splice(j,1);
      }
      raf=requestAnimationFrame(frame);
    }
    size(); window.addEventListener('resize', size);
    if(window.matchMedia('(prefers-reduced-motion: reduce)').matches){
      ctx.clearRect(0,0,W,H); for(var k=0;k<drops.length;k++) drop(drops[k]);
    } else frame();
  }
  document.querySelectorAll('.pane canvas').forEach(glass);
})();
</script>
</body>
</html>
