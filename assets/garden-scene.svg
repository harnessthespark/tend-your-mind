<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 2080 1037">
  <!-- TWO-STATE SCENE (Lisa's sundial redesign).
       calm-garden.png   = blue sky, gardener tending, quiet alarm, brick wall + gate.
       anxiety-garden.png = grey sky, gardener locked out, alarm sounding.
       applyScene() toggles svg.storm → CSS cross-fades calm → anxiety. -->
  <image x="0" y="0" width="2080" height="1037" xlink:href="assets/calmstate.png"/>
  <image id="stormscene" x="0" y="0" width="2080" height="1037" xlink:href="assets/negativestate.png"/>

  <!-- tap-targets. The WALL hotspot is FIRST (lowest priority) so the object hotspots
       below win wherever they overlap it. -->
  <rect data-wall="1"  x="210"  y="320" width="1560" height="175" fill="none" pointer-events="all" style="cursor:pointer"/>

  <!-- role hotspots → PART_TO_ROLE → role cards. -->
  <rect id="seedshed"  x="104"  y="146" width="333" height="395" fill="none" pointer-events="all" style="cursor:pointer"/>
  <rect id="calmalarm" x="11"   y="572" width="146" height="239" fill="none" pointer-events="all" style="cursor:pointer"/>
  <rect id="gardner"   x="541"  y="457" width="229" height="541" fill="none" pointer-events="all" style="cursor:pointer"/>
  <rect id="bucket"    x="874"  y="707" width="208" height="281" fill="none" pointer-events="all" style="cursor:pointer"/>
  <rect id="tap"       x="1373" y="385" width="312" height="270" fill="none" pointer-events="all" style="cursor:pointer"/>

  <!-- the sundial reads your weather → jumps to the weather/feelings screen (data-screen 6). -->
  <rect data-go="6"    x="965"  y="500" width="180" height="210" fill="none" pointer-events="all" style="cursor:pointer"/>
</svg>
